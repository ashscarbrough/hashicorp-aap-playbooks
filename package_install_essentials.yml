---
# =============================================================================
# Stage 1 — Operational Essentials
# Target: Amazon Linux 2023
#
# Installs the baseline toolchain that every provisioned VM should carry.
# These packages support day-to-day operations, scripting, and package
# management tasks that all subsequent stages depend on.
#
# Note: curl-minimal and gnupg2-minimal are intentionally omitted from this
# list. AL2023 ships both pre-installed on the base AMI as *-minimal variants
# that conflict with their full counterparts. Declaring either causes a dnf
# depsolve error. Both are left under AMI-managed state.
#
# Packages:
#   git         - Distributed version control; required for cloning repos,
#                 pulling config, and tracking infrastructure-as-code changes.
#   htop        - Interactive process viewer; provides a real-time, visual
#                 overview of CPU, memory, and running processes.
# =============================================================================

- name: "Stage 1 — Operational essentials"
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update dnf cache and upgrade existing packages
      ansible.builtin.dnf:
        update_cache: true
        name: "*"
        state: latest

    - name: Install operational essentials
      ansible.builtin.dnf:
        name:
          - git
          - htop
        state: present

    - name: Confirm git is available
      ansible.builtin.command: git --version
      register: git_version
      changed_when: false

    - name: Print git version
      ansible.builtin.debug:
        msg: "{{ git_version.stdout }}"