---
- name: Install IBM WebSphere Application Server (skeleton - requires IBM media)
  hosts: all
  become: true
  gather_facts: true

  vars:
    # You must provide these in AAP extra vars, inventory vars, or a vars file.
    was_install_root: /opt/IBM/WebSphere/AppServer
    im_install_root: /opt/IBM/InstallationManager
    was_user: websphere
    was_group: websphere

    # Paths on the managed host (you must stage these artifacts yourself)
    im_installer_path: ""          # e.g. /tmp/IM/installer
    was_repository_path: ""        # e.g. /tmp/WAS/repo
    was_response_file_path: ""     # e.g. /tmp/was_response.xml

  pre_tasks:
    - name: Ensure supported OS
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "RedHat"
        fail_msg: "This playbook targets RHEL-family/Amazon Linux 2023."

    - name: Validate required variables/artifacts are provided
      ansible.builtin.assert:
        that:
          - im_installer_path | length > 0
          - was_repository_path | length > 0
          - was_response_file_path | length > 0
        fail_msg: |
          Missing required variables. Provide:
            im_installer_path (staged Installation Manager installer)
            was_repository_path (staged WAS repository)
            was_response_file_path (silent install response file)

  tasks:
    - name: Install OS prerequisites (typical)
      ansible.builtin.package:
        name:
          - tar
          - unzip
          - java-11-openjdk
          - fontconfig
          - libXext
          - libXrender
          - libXi
          - libXtst
        state: present

    - name: Create group
      ansible.builtin.group:
        name: "{{ was_group }}"
        state: present

    - name: Create user
      ansible.builtin.user:
        name: "{{ was_user }}"
        group: "{{ was_group }}"
        create_home: true
        shell: /bin/bash
        state: present

    - name: Create install directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ was_user }}"
        group: "{{ was_group }}"
        mode: "0755"
      loop:
        - "{{ im_install_root }}"
        - "{{ was_install_root }}"

    - name: Install IBM Installation Manager (placeholder)
      ansible.builtin.command: >
        {{ im_installer_path }}/installc
        -acceptLicense
        -installationDirectory {{ im_install_root }}
      args:
        creates: "{{ im_install_root }}/eclipse"
      become_user: "{{ was_user }}"

    - name: Install WebSphere using response file (placeholder)
      ansible.builtin.command: >
        {{ im_install_root }}/eclipse/tools/imcl
        input {{ was_response_file_path }}
        -acceptLicense
        -repositories {{ was_repository_path }}
      args:
        creates: "{{ was_install_root }}/bin/startServer.sh"
      become_user: "{{ was_user }}"

    - name: Post-install note
      ansible.builtin.debug:
        msg: >
          WebSphere install attempted. Validate profiles/servers separately (this is a demo skeleton).