---
- name: Configure demo instance — AAP runtime layer
  hosts: all
  become: true
  gather_facts: false        # REQUIRED — prevents implicit fact gathering
                             # before pre_tasks run. Without this, Ansible
                             # attempts SSH before the wait logic executes,
                             # causing Connection refused on new instances.

  vars:
    config_version: "1.3.0"
    aap_job_id: "{{ tower_job_id | default('unknown') }}"
    aap_job_url: "{{ tower_url | default('unknown') }}/api/v2/jobs/{{ tower_job_id }}"

  pre_tasks:
    - name: Install boto3 and botocore via pip
      ansible.builtin.pip:
        name:
          - boto3
          - botocore
        state: present
      delegate_to: localhost
      become: false

    - name: Check if AWS CLI is already installed
      ansible.builtin.command: aws --version
      register: aws_cli_check
      ignore_errors: true
      delegate_to: localhost
      become: false

    - name: Install AWS CLI if not present
      ansible.builtin.shell: |
        curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
        unzip -q /tmp/awscliv2.zip -d /tmp/
        /tmp/aws/install --update
        rm -rf /tmp/aws /tmp/awscliv2.zip
      delegate_to: localhost
      become: false
      when: aws_cli_check.rc != 0

    - name: Check if SSM plugin is already installed
      ansible.builtin.shell: which session-manager-plugin && session-manager-plugin --version
      register: ssm_plugin_check
      ignore_errors: true
      failed_when: false
      delegate_to: localhost
      become: false

    - name: Install SSM Session Manager plugin if not present
      ansible.builtin.shell: |
        curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm" \
          -o /tmp/session-manager-plugin.rpm
        rpm -i /tmp/session-manager-plugin.rpm
        rm -f /tmp/session-manager-plugin.rpm
      delegate_to: localhost
      become: false
      when: ssm_plugin_check.rc != 0

    - name: Install community.aws collection if not present
      ansible.builtin.command: >
        ansible-galaxy collection install community.aws --ignore-certs
      delegate_to: localhost
      become: false
      ignore_errors: true

    - name: Gather facts
      ansible.builtin.setup:
        gather_subset:
          - network
          - hardware
          - virtual

  tasks:

    # -------------------------------------------------------
    # Task 1 — Update the version page with live runtime info
    # Shows: Packer baked the base, Ansible knows the runtime
    # -------------------------------------------------------
    - name: Inject runtime details into existing Packer page
      ansible.builtin.blockinfile:
        path: /usr/share/nginx/html/index.html
        marker: "<!-- {mark} ANSIBLE MANAGED BLOCK -->"
        block: |
          <div style="border-top:2px solid #EE0000;margin-top:20px;padding-top:20px;">
          <h2><span class='badge ansible'>Ansible Automation Platform</span></h2>
          <table>
            <tr><th>Config version</th><td>{{ config_version }}</td></tr>
            <tr><th>Hostname</th><td>{{ ansible_hostname }}</td></tr>
            <tr><th>IP address</th><td>{{ ansible_default_ipv4.address }}</td></tr>
            <tr><th>Total memory</th><td>{{ ansible_memtotal_mb }} MB</td></tr>
            <tr><th>CPU cores</th><td>{{ ansible_processor_vcpus }}</td></tr>
            <tr><th>AAP job ID</th><td>{{ aap_job_id }}</td></tr>
            <tr><th>Configured at</th><td>{{ ansible_date_time.iso8601 }}</td></tr>
          </table>
          </div>

    # -------------------------------------------------------
    # Task 2 — Write the /status endpoint
    # This is pure runtime data — impossible to bake into image
    # -------------------------------------------------------
    - name: Write runtime status page
      ansible.builtin.copy:
        dest: /var/www/status/index.html
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>Instance Status</title>
          <style>body{font-family:monospace;max-width:800px;margin:40px auto;padding:0 20px;}
          .ok{color:green;font-weight:bold;}</style></head>
          <body>
          <h1>Instance Health Status</h1>
          <p>Status: <span class='ok'>HEALTHY</span></p>
          <h2>Ansible Audit Trail</h2>
          <pre>
          Job ID    : {{ aap_job_id }}
          Timestamp : {{ ansible_date_time.iso8601 }}
          Host      : {{ ansible_hostname }}
          IP        : {{ ansible_default_ipv4.address }}
          Version   : {{ config_version }}
          </pre>
          </body></html>
        mode: '0644'

    # -------------------------------------------------------
    # Task 3 — Write audit file to the instance
    # Tangible proof on the filesystem that AAP ran
    # -------------------------------------------------------
    - name: Write Ansible audit file
      ansible.builtin.copy:
        dest: /etc/ansible-configured
        content: |
          Configured by Ansible Automation Platform
          ==========================================
          Timestamp : {{ ansible_date_time.iso8601 }}
          AAP job   : {{ aap_job_id }}
          Version   : {{ config_version }}
          Host      : {{ ansible_hostname }}
          IP        : {{ ansible_default_ipv4.address }}
        mode: '0644'

    # -------------------------------------------------------
    # Task 4 — Ensure nginx is serving correctly
    # Validates the full chain worked end to end
    # -------------------------------------------------------
    - name: Ensure nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Verify index page is reachable
      ansible.builtin.uri:
        url: "http://{{ ansible_default_ipv4.address }}"
        return_content: true
        status_code: 200
      register: health_check

    - name: Verify status page is reachable
      ansible.builtin.uri:
        url: "http://{{ ansible_default_ipv4.address }}/status"
        return_content: true
        status_code: 200

    - name: Report success
      ansible.builtin.debug:
        msg: >
          Instance {{ ansible_hostname }} configured successfully.
          Version {{ config_version }} is live at http://{{ ansible_default_ipv4.address }}