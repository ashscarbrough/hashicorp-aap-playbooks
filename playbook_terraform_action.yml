---
- name: Test AAP File Creation Using Terraform Actions
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait for SSH connectivity to target host
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
        sleep: 15
        connect_timeout: 10
      become: false

    - name: Wait for cloud-init to finish when present
      ansible.builtin.raw: |
        if command -v cloud-init >/dev/null 2>&1; then
          cloud-init status --wait
        fi
      changed_when: false

  tasks:
    - name: Create proof file on target host
      ansible.builtin.copy:
        dest: /tmp/aap-terraform-action-file.txt
        mode: "0644"
        content: |
          AAP connectivity proof - Using Terraform Actions
          inventory_hostname={{ inventory_hostname }}
          ansible_host={{ ansible_host | default('undefined') }}
          created_at={{ now(fmt='%Y-%m-%dT%H:%M:%S%z') }}

    - name: Verify proof file exists
      ansible.builtin.stat:
        path: /tmp/aap-terraform-action-file.txt
      register: proof_file

    - name: Report proof file status
      ansible.builtin.debug:
        msg: "Proof file created on {{ inventory_hostname }}: {{ proof_file.stat.path }}"
