---
# configure_demo_instance_v1.2.0.yml
#
# Deploys the v1.2.0 configuration to the demo instance.
# Run this job template from the AAP UI to install (or restore) version 1.2.0.
# Using the same blockinfile markers as configure_demo_instance.yml ensures this
# playbook is fully idempotent and safely overwrites any previously applied version.

# -------------------------------------------------------
# Play 1 — Prepare execution environment on AAP runner
# Installs AWS CLI, SSM plugin, and community.aws collection
# -------------------------------------------------------
- name: Prepare execution environment
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Test basic shell
      ansible.builtin.shell: echo "test"
      register: test_output

    - name: Show output
      ansible.builtin.debug:
        msg: "{{ test_output.stdout }}"

    - name: Test basic command
      ansible.builtin.command: echo "test"
      register: test_output

    - name: Show output
      ansible.builtin.debug:
        msg: "{{ test_output.stdout }}"

    - name: Validate required variables are set
      ansible.builtin.assert:
        that:
          - ssm_instance_id is defined
          - ssm_instance_id != ''
          - aws_region is defined
          - ssm_bucket_name is defined
        fail_msg: >
          Missing required variables.
          ssm_instance_id={{ ssm_instance_id | default('NOT SET') }}
          aws_region={{ aws_region | default('NOT SET') }}
          ssm_bucket_name={{ ssm_bucket_name | default('NOT SET') }}

    - name: Check Python and pip availability
      ansible.builtin.shell: |
        echo "Python: $(which python3 2>/dev/null || echo NOT FOUND)"
        echo "Version: $(python3 --version 2>/dev/null || echo NOT FOUND)"
        echo "Pip: $(python3 -m pip --version 2>/dev/null || echo NOT FOUND)"
      register: python_check
      changed_when: false

    - name: Show Python environment
      ansible.builtin.debug:
        msg: "{{ python_check.stdout_lines }}"

    - name: Install pip if not present
      ansible.builtin.shell: |
        curl -sL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
        python3 /tmp/get-pip.py
        rm -f /tmp/get-pip.py
      register: pip_bootstrap
      changed_when: "'Successfully installed' in pip_bootstrap.stdout"
      failed_when: false

    - name: Install boto3 and botocore
      ansible.builtin.shell: |
        python3 -m pip install --upgrade boto3 botocore
      register: pip_install
      changed_when: "'Successfully installed' in pip_install.stdout"

    - name: Check if AWS CLI is already installed
      ansible.builtin.shell: which aws && aws --version
      register: aws_cli_check
      failed_when: false
      changed_when: false

    - name: Install AWS CLI if not present
      ansible.builtin.shell: |
        curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" \
          -o /tmp/awscliv2.zip
        unzip -q /tmp/awscliv2.zip -d /tmp/
        /tmp/aws/install --update
        rm -rf /tmp/aws /tmp/awscliv2.zip
      when: aws_cli_check.rc != 0

    - name: Check if SSM plugin is already installed
      ansible.builtin.shell: which session-manager-plugin && session-manager-plugin --version
      register: ssm_plugin_check
      failed_when: false
      changed_when: false

    - name: Install SSM Session Manager plugin if not present
      ansible.builtin.shell: |
        curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm" \
          -o /tmp/session-manager-plugin.rpm
        rpm -i /tmp/session-manager-plugin.rpm
        rm -f /tmp/session-manager-plugin.rpm
      when: ssm_plugin_check.rc != 0

    - name: Install community.aws collection
      ansible.builtin.shell: |
        ansible-galaxy collection install community.aws --ignore-certs
      register: collection_install
      changed_when: "'Installing' in collection_install.stdout"

    - name: Wait for SSM agent to be online
      ansible.builtin.shell: |
        aws ssm describe-instance-information \
          --filters "Key=InstanceIds,Values={{ ssm_instance_id }}" \
          --region {{ aws_region | default('us-east-1') }} \
          --query 'InstanceInformationList[0].PingStatus' \
          --output text
      register: ssm_status
      retries: 12
      delay: 15
      until: ssm_status.stdout.strip() == "Online"


- name: Configure demo instance — v1.2.0
  hosts: all
  become: true

  vars:
    config_version: "1.2.0"
    aap_job_id: "{{ tower_job_id | default('unknown') }}"

  pre_tasks:
    - name: Wait for SSH connection
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to complete
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

  tasks:

    # -------------------------------------------------------
    # Task 1 — Gather facts
    # -------------------------------------------------------
    - name: Gather instance facts
      ansible.builtin.setup:
        gather_subset:
          - network
          - hardware

    # -------------------------------------------------------
    # Task 2 — Write v1.2.0 runtime details to the version page
    # Uses the same blockinfile markers as configure_demo_instance.yml
    # so this playbook is idempotent and can overwrite any version.
    # -------------------------------------------------------
    - name: Write v1.2.0 runtime details to version page
      ansible.builtin.blockinfile:
        path: /usr/share/nginx/html/index.html
        marker: "<!-- {mark} ANSIBLE MANAGED BLOCK -->"
        block: |
          <div style="border-top:2px solid #EE0000;margin-top:20px;padding-top:20px;">
          <h2><span class='badge ansible'>Ansible Automation Platform</span></h2>
          <table>
            <tr><th>Config version</th><td>{{ config_version }}</td></tr>
            <tr><th>Hostname</th><td>{{ ansible_hostname }}</td></tr>
            <tr><th>IP address</th><td>{{ ansible_default_ipv4.address }}</td></tr>
            <tr><th>Total memory</th><td>{{ ansible_memtotal_mb }} MB</td></tr>
            <tr><th>CPU cores</th><td>{{ ansible_processor_vcpus }}</td></tr>
            <tr><th>AAP job ID</th><td>{{ aap_job_id }}</td></tr>
            <tr><th>Configured at</th><td>{{ ansible_date_time.iso8601 }}</td></tr>
          </table>
          <p style="color:#888;font-style:italic;margin-top:12px;">&#9888; /status endpoint not available in v1.2.0 &mdash; upgrade to v1.3.0 to enable.</p>
          </div>

    # -------------------------------------------------------
    # Task 3 — Remove the /status endpoint
    # /status was introduced in v1.3.0. Rolling back to v1.2.0
    # removes the directory entirely so nginx returns 404.
    # Removing the directory (not just the file) avoids nginx
    # returning 403 Forbidden when an empty directory exists.
    # -------------------------------------------------------
    - name: Remove status endpoint directory (not available in v1.2.0)
      ansible.builtin.file:
        path: /var/www/status
        state: absent

    # -------------------------------------------------------
    # Task 4 — Write audit file to the instance
    # -------------------------------------------------------
    - name: Write v1.2.0 audit file
      ansible.builtin.copy:
        dest: /etc/ansible-configured
        content: |
          Configured by Ansible Automation Platform
          ==========================================
          Timestamp : {{ ansible_date_time.iso8601 }}
          AAP job   : {{ aap_job_id }}
          Version   : {{ config_version }}
          Host      : {{ ansible_hostname }}
          IP        : {{ ansible_default_ipv4.address }}
        mode: '0644'

    # -------------------------------------------------------
    # Task 5 — Validate nginx is serving correctly
    # -------------------------------------------------------
    - name: Ensure nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Verify index page is reachable
      ansible.builtin.uri:
        url: "http://{{ ansible_default_ipv4.address }}"
        return_content: true
        status_code: 200

    - name: Verify status endpoint is unavailable (not present in v1.2.0)
      ansible.builtin.uri:
        url: "http://{{ ansible_default_ipv4.address }}/status"
        status_code: [403, 404]

    - name: Report success
      ansible.builtin.debug:
        msg: >
          Instance {{ ansible_hostname }} is running version {{ config_version }}.
          Live at http://{{ ansible_default_ipv4.address }}
