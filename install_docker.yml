---
- name: Install Docker Engine + Compose (RHEL / Amazon Linux 2023)
  hosts: all
  become: true
  gather_facts: true

  vars:
    docker_install_compose: true
    docker_users: []   # e.g. ["ec2-user", "ansible"]
    docker_packages_rhel:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

  pre_tasks:
    - name: Ensure supported OS
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "RedHat"
        fail_msg: "This playbook supports RHEL-family and Amazon Linux 2023 (os_family=RedHat). Detected: {{ ansible_facts.os_family }}"

    - name: Show detected distro
      ansible.builtin.debug:
        msg: "Detected {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}"

  tasks:
    - name: Install dnf plugins (needed for config-manager)
      ansible.builtin.package:
        name:
          - dnf-plugins-core
          - ca-certificates
          - curl
          - gnupg2
        state: present

    - name: Add Docker CE repo (RHEL/CentOS/Alma/Rocky)
      ansible.builtin.command: >
        dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo
      when: ansible_facts.distribution not in ["Amazon"]

    - name: Add Docker CE repo (Amazon Linux 2023)
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: "0644"
        content: |
          [docker-ce-stable]
          name=Docker CE Stable - $basearch
          baseurl=https://download.docker.com/linux/centos/9/$basearch/stable
          enabled=1
          gpgcheck=1
          gpgkey=https://download.docker.com/linux/centos/gpg
      when: ansible_facts.distribution in ["Amazon"]

    - name: Install Docker Engine packages
      ansible.builtin.package:
        name: "{{ docker_packages_rhel }}"
        state: present

    - name: Ensure docker service enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add users to docker group (optional)
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"
      when: docker_users | length > 0

    - name: Verify docker works
      ansible.builtin.command: docker version
      register: docker_version
      changed_when: false

    - name: Show docker version
      ansible.builtin.debug:
        var: docker_version.stdout_lines

    - name: Verify docker compose plugin works (if installed)
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false
      failed_when: false

    - name: Show docker compose version (best effort)
      ansible.builtin.debug:
        var: compose_version.stdout_lines