---
- name: Deploy Liberty Demo Application
  hosts:
    - all
  gather_facts: true
  become: yes
  become_method: sudo

  vars:
    # S3 artifact source
    s3_bucket:      "ams-hashicorp-artifacts"
    aws_region:     "us-east-1"
    s3_war_key:     "liberty/apps/liberty-demo.war"

    # Liberty paths
    liberty_usr_dir:     "/usr/WebSphere/usr"
    liberty_server_name: "liberty-base"
    liberty_server_dir:  "{{ liberty_usr_dir }}/servers/{{ liberty_server_name }}"
    liberty_wlp_dir:     "/usr/WebSphere/wlp"

    # deploy_mode is static for this path
    deploy_mode: "non-immutable"

    # app_version and alb_dns_name are passed as extra vars from AAP workflow
    # Defaults allow the playbook to run standalone outside the workflow

  tasks:

    # PRE-FLIGHT

    - name: Check Liberty is installed
      stat:
        path: "{{ liberty_wlp_dir }}"
      register: wlp_check

    - name: Abort if Liberty not present
      fail:
        msg: "Liberty not found at {{ liberty_wlp_dir }} - run install-liberty-base first."
      when: not wlp_check.stat.exists

    - name: Ensure apps directory exists
      file:
        path: "{{ liberty_server_dir }}/apps"
        state: directory
        owner: wsadmin
        group: wsadm
        mode: '0755'

    - name: Ensure apps/demo sidecar directory exists
      file:
        path: "{{ liberty_server_dir }}/apps/demo"
        state: directory
        owner: wsadmin
        group: wsadm
        mode: '0755'

    # PULL WAR FROM S3

    - name: Download liberty-demo.war from S3
      command: >
        aws s3 cp s3://{{ s3_bucket }}/{{ s3_war_key }}
        {{ liberty_server_dir }}/apps/liberty-demo.war
      environment:
        AWS_DEFAULT_REGION: "{{ aws_region }}"

    - name: Set ownership on WAR file
      file:
        path: "{{ liberty_server_dir }}/apps/liberty-demo.war"
        owner: wsadmin
        group: wsadm
        mode: '0644'

    # APPLICATION CONFIG
    # application1.xml uses absolute path to avoid Liberty symlink
    # resolution issues with relative paths

    - name: Deploy application1.xml to server config dir
      copy:
        dest: "{{ liberty_server_dir }}/application1.xml"
        owner: wsadmin
        group: wsadm
        mode: '0644'
        content: |
          <server>
              <application id="liberty-demo"
                           name="liberty-demo"
                           type="war"
                           location="{{ liberty_server_dir }}/apps/liberty-demo.war">
                  <classloader delegation="parentLast"/>
              </application>
          </server>

    - name: Deploy app.properties (non-immutable)
      copy:
        dest: "{{ liberty_server_dir }}/apps/demo/app.properties"
        owner: wsadmin
        group: wsadm
        mode: '0644'
        content: |
          # Written by AAP deploy-liberty-app job template
          # Path: non-immutable

          deploy.mode=non-immutable
          app.version={{ app_version | default('1.0.0') }}
          liberty.version=26.0.0

          # HCP Packer fields intentionally blank for non-immutable path
          ami.id=
          ami.version=
          packer.bucket=
          packer.channel=
          packer.build.timestamp=

    # RESTART LIBERTY
    # application1.xml is pulled in via an <include> directive in server.xml
    # The applicationMonitor polled mode does not detect new <include> directives
    # dynamically -- a restart is required for Liberty to register the new app

    - name: Stop Liberty server
      command: >
        su - wsadmin -c
        "{{ liberty_wlp_dir }}/bin/server stop {{ liberty_server_name }}"
      environment:
        JAVA_HOME: "{{ ansible_env.JAVA_HOME | default('/usr/lib/jvm/java-11-openjdk') }}"
        WLP_USER_DIR: "{{ liberty_usr_dir }}"
      register: liberty_stop_result
      failed_when:
        - liberty_stop_result.rc != 0
        - "'is not running' not in liberty_stop_result.stdout"

    - name: Start Liberty server
      command: >
        su - wsadmin -c
        "{{ liberty_wlp_dir }}/bin/server start {{ liberty_server_name }}"
      environment:
        JAVA_HOME: "{{ ansible_env.JAVA_HOME | default('/usr/lib/jvm/java-11-openjdk') }}"
        WLP_USER_DIR: "{{ liberty_usr_dir }}"
      register: liberty_start_result
      failed_when:
        - liberty_start_result.rc != 0
        - "'already running' not in liberty_start_result.stdout"

    - name: Wait for Liberty HTTP endpoint to come back up
      wait_for:
        host: "127.0.0.1"
        port: 9080
        timeout: 120
        state: started

    # VERIFY APPLICATION
    # Health check via ALB DNS to validate the full traffic path
    # alb_dns_name is passed as an extra var from the Terraform action

    - name: Verify application endpoint via ALB
      uri:
        url: "http://{{ alb_dns_name | default('127.0.0.1') }}/liberty-demo/health"
        method: GET
        status_code: 200
        timeout: 30
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200
      delegate_to: localhost
      become: no

    - name: Print health check response
      debug:
        msg: "Health check passed - {{ health_check.json }}"