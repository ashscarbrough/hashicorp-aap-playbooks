---
- name: Install packages dynamically with optional version pinning
  hosts: all
  become: true

  vars:
    packages: "{{ packages | default([]) }}"

  pre_tasks:
    - name: Wait for SSH connection
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

  tasks:
    - name: Debug all variables
      ansible.builtin.debug:
        msg: "packages = {{ packages | default('NOT SET') }}"

    - name: Fail if no packages provided
      ansible.builtin.fail:
        msg: "No packages specified. Pass a 'packages' list as an extra variable."
      when: packages | length == 0

    - name: Install packages without version pinning
      ansible.builtin.dnf:
        name: "{{ item.name }}"
        state: present
      loop: "{{ packages | selectattr('version', 'undefined') | list }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Install packages with version pinning
      ansible.builtin.dnf:
        name: "{{ item.name }}-{{ item.version }}"
        state: present
      loop: "{{ packages | selectattr('version', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }}-{{ item.version }}"

    - name: Build installed package summary
      ansible.builtin.set_fact:
        installed_summary: >-
          {{
            packages | map(attribute='name') | list
            | zip(packages | map(attribute='version', default='latest') | list)
            | map('join', '@')
            | list
          }}

    - name: Report installed packages
      ansible.builtin.debug:
        msg: "Successfully installed: {{ installed_summary | join(', ') }}"