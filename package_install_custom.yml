---
- name: Install packages dynamically
  hosts: all
  become: true

  vars:
    packages_list: "{{ packages | default([]) }}"

  tasks:
  tasks:
    - name: Debug all variables
      ansible.builtin.debug:
        msg: "packages = {{ packages | default('NOT SET') }}"

    - name: Fail if no packages provided
      ansible.builtin.fail:
        msg: "No packages specified. Pass a 'packages' list as an extra variable."
      when: packages_list | length == 0

    - name: Install packages without version pinning
      ansible.builtin.dnf:
        name: "{{ item.name }}"
        state: present
      loop: "{{ packages_list | selectattr('version', 'undefined') | list }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Install packages with version pinning
      ansible.builtin.dnf:
        name: "{{ item.name }}-{{ item.version }}"
        state: present
      loop: "{{ packages_list | selectattr('version', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }}-{{ item.version }}"

    - name: Report installed packages
      ansible.builtin.debug:
        msg: "Successfully installed: {{ packages_list | map(attribute='name') | join(', ') }}"