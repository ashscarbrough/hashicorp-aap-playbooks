---
# =============================================================================
# Stage 2 — Security and Compliance Hardening
# Target: Amazon Linux 2023
#
# Applies a baseline security posture to the VM. Host-level network filtering
# is intentionally omitted — access control is handled at the AWS Security
# Group layer. This playbook focuses on intrusion prevention and audit logging.
#
# Packages:
#   fail2ban        - Intrusion prevention daemon; monitors log files for
#                     repeated authentication failures and temporarily bans
#                     offending IP addresses via firewall rules.
#   audit           - Linux Audit daemon (auditd); records system calls, file
#                     access, and privilege escalation events to a tamper-evident
#                     log. Required by many compliance frameworks for traceability.
#                     On AL2023, audispd-plugins are bundled within this package.
#
# Variables:
#   fail2ban_maxretry  - Number of failed auth attempts before a ban is issued.
#   fail2ban_bantime   - Duration in seconds an offending IP remains banned.
# =============================================================================

- name: "Stage 2 — Security and compliance hardening"
  hosts: all
  become: true
  gather_facts: true

  vars:
    fail2ban_maxretry: 5
    fail2ban_bantime: 3600

  tasks:
    - name: Remove firewalld if present
      # firewalld causes persistent SSH lockout issues on AL2023 due to
      # zone/interface binding conflicts. Security Group rules handle
      # network-level access control on EC2.
      ansible.builtin.dnf:
        name: firewalld
        state: absent

    - name: Install security packages
      ansible.builtin.dnf:
        name:
          - fail2ban
          - audit
        state: present

    - name: Deploy fail2ban SSH jail config
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/ssh.conf
        mode: "0644"
        content: |
          [DEFAULT]
          ignoreip = 127.0.0.1/8 {{ ansible_env['SSH_CLIENT'].split()[0] if 'SSH_CLIENT' in ansible_env else '' }}

          [sshd]
          enabled  = true
          port     = ssh
          maxretry = {{ fail2ban_maxretry }}
          bantime  = {{ fail2ban_bantime }}
      notify: Restart fail2ban

    - name: Enable and start fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

    - name: Enable and start auditd
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started

    - name: Verify fail2ban is running
      ansible.builtin.command: fail2ban-client status
      register: fail2ban_status
      changed_when: false

    - name: Print fail2ban status
      ansible.builtin.debug:
        msg: "{{ fail2ban_status.stdout_lines }}"

    - name: Verify SSH port is still reachable from control node
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 22
        timeout: 30
      delegate_to: localhost
      become: false

  handlers:
    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted