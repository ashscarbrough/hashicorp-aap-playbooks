---
# =============================================================================
# Stage 2 — Security and Compliance Hardening
# Target: Amazon Linux 2023
#
# Applies a baseline security posture to the VM. Configures a host firewall,
# intrusion prevention for SSH, and system-call auditing to satisfy common
# compliance requirements (CIS, SOC 2, internal policy gates).
#
# Packages:
#   firewalld       - Dynamic firewall daemon; manages netfilter rules via
#                     zones and services. The standard host firewall on AL2023,
#                     replacing ufw which is Ubuntu-specific. Configured here
#                     to permit SSH, HTTP, and HTTPS, dropping all other
#                     incoming traffic.
#   fail2ban        - Intrusion prevention daemon; monitors log files for
#                     repeated authentication failures and temporarily bans
#                     offending IP addresses via firewall rules.
#   audit           - Linux Audit daemon (auditd); records system calls, file
#                     access, and privilege escalation events to a tamper-evident
#                     log. Required by many compliance frameworks for traceability.
#                     On AL2023, audispd-plugins are bundled within this package.
#
# Variables:
#   fail2ban_maxretry  - Number of failed auth attempts before a ban is issued.
#   fail2ban_bantime   - Duration in seconds an offending IP remains banned.
#
# Safety note: All three service rules (SSH, HTTP, HTTPS) are applied to the
# drop zone with immediate:true before any reload or restart occurs. The play
# ends with an explicit SSH connectivity verification so any lockout is caught
# immediately rather than discovered when the next playbook runs.
# =============================================================================

- name: "Stage 2 — Security and compliance hardening"
  hosts: all
  become: true
  gather_facts: false

  vars:
    fail2ban_maxretry: 5
    fail2ban_bantime: 3600

  tasks:
    - name: Install security packages
      ansible.builtin.dnf:
        name:
          - firewalld
          - fail2ban
          - audit
        state: present

    - name: Enable and start firewalld
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Allow SSH through firewalld (public zone)
      # Rules are applied to the public zone which is where eth0 is bound
      # on AL2023 by default. Attempting to reassign zones or change the
      # default zone causes interface binding issues that block SSH on
      # subsequent playbook runs.
      ansible.posix.firewalld:
        service: ssh
        zone: public
        permanent: true
        state: enabled
        immediate: true

    - name: Allow HTTP through firewalld (public zone)
      ansible.posix.firewalld:
        service: http
        zone: public
        permanent: true
        state: enabled
        immediate: true

    - name: Allow HTTPS through firewalld (public zone)
      ansible.posix.firewalld:
        service: https
        zone: public
        permanent: true
        state: enabled
        immediate: true

    - name: Promote running config to permanent
      # Persists the immediate rules to disk without a reload cycle.
      ansible.builtin.command: firewall-cmd --runtime-to-permanent
      changed_when: false

    - name: Verify SSH is listed in active public zone services
      # Fails fast here rather than locking out the next playbook stage.
      ansible.builtin.command: firewall-cmd --zone=public --list-services
      register: public_zone_services
      changed_when: false
      failed_when: "'ssh' not in public_zone_services.stdout"

    - name: Print active public zone services
      ansible.builtin.debug:
        msg: "Active public zone services: {{ public_zone_services.stdout }}"


    - name: Deploy fail2ban SSH jail config
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/ssh.conf
        mode: "0644"
        content: |
          [DEFAULT]
          ignoreip = 127.0.0.1/8 {{ ansible_env.SSH_CLIENT.split()[0] }}

          [sshd]
          enabled  = true
          port     = ssh
          maxretry = {{ fail2ban_maxretry }}
          bantime  = {{ fail2ban_bantime }}
      notify: Restart fail2ban

    - name: Enable and start auditd
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started

    - name: Verify SSH port is still reachable from control node
      # Final end-to-end check — confirms the instance is still accessible
      # after all firewall changes have been applied and reloaded.
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 22
        timeout: 30
      delegate_to: localhost

  handlers:
    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted