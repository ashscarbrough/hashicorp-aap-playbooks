---
# =============================================================================
# Stage 2 — Security and Compliance Hardening
# Target: Amazon Linux 2023
#
# Applies a baseline security posture to the VM. Configures a host firewall,
# intrusion prevention for SSH, and system-call auditing to satisfy common
# compliance requirements (CIS, SOC 2, internal policy gates).
#
# Packages:
#   firewalld       - Dynamic firewall daemon; manages netfilter rules via
#                     zones and services. The standard host firewall on AL2023,
#                     replacing ufw which is Ubuntu-specific. Configured here
#                     to permit SSH, HTTP, and HTTPS, dropping all other
#                     incoming traffic.
#   fail2ban        - Intrusion prevention daemon; monitors log files for
#                     repeated authentication failures and temporarily bans
#                     offending IP addresses via firewall rules.
#   audit           - Linux Audit daemon (auditd); records system calls, file
#                     access, and privilege escalation events to a tamper-evident
#                     log. Required by many compliance frameworks for traceability.
#                     On AL2023, audispd-plugins are bundled within this package.
#
# Variables:
#   fail2ban_maxretry  - Number of failed auth attempts before a ban is issued.
#   fail2ban_bantime   - Duration in seconds an offending IP remains banned.
#
# Safety note: SSH is written directly into the firewalld zone config file
# as a pre_task before the service is started. This prevents the window
# where firewalld could start and block port 22 before the allow rule
# is applied, which would make the instance unreachable mid-play.
# =============================================================================

- name: "Stage 2 — Security and compliance hardening"
  hosts: all
  become: true
  gather_facts: false

  vars:
    fail2ban_maxretry: 5
    fail2ban_bantime: 3600

  pre_tasks:
    - name: Ensure firewalld is installed before pre-configuring zones
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Check if firewalld public zone file already exists
      # The zone file only exists if firewalld has been started before.
      # On a fresh instance it will not be present, so we skip the
      # pre-configuration and rely on firewalld's default SSH allowance.
      ansible.builtin.stat:
        path: /etc/firewalld/zones/public.xml
      register: firewalld_zone_file

    - name: Pre-configure SSH in public zone before starting firewalld
      # Only runs on re-runs where the zone file already exists.
      # Ensures SSH is present in the config before firewalld restarts,
      # closing the lockout window on subsequent provisioning attempts.
      ansible.builtin.lineinfile:
        path: /etc/firewalld/zones/public.xml
        insertafter: '<zone>'
        line: '  <service name="ssh"/>'
      when: firewalld_zone_file.stat.exists

  tasks:
    - name: Install remaining security packages
      ansible.builtin.dnf:
        name:
          - fail2ban
          - audit
        state: present

    - name: Enable and start firewalld
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Bind eth0 interface to public zone
      # Must happen before setting the default zone to drop.
      # Without this, setting the default to drop orphans the interface
      # in the drop zone where no service rules exist, blocking all traffic
      # including SSH, HTTP, and HTTPS even though those rules are defined
      # in the public zone.
      ansible.posix.firewalld:
        zone: public
        interface: eth0
        permanent: true
        state: enabled
        immediate: true

    - name: Allow SSH through firewalld (public zone)
      ansible.posix.firewalld:
        service: ssh
        zone: public
        permanent: true
        state: enabled
        immediate: true

    - name: Allow HTTP through firewalld (public zone)
      ansible.posix.firewalld:
        service: http
        zone: public
        permanent: true
        state: enabled
        immediate: true

    - name: Allow HTTPS through firewalld (public zone)
      ansible.posix.firewalld:
        service: https
        zone: public
        permanent: true
        state: enabled
        immediate: true

    - name: Set default zone to drop all other incoming traffic
      # Safe to set after eth0 is explicitly bound to public above.
      # New interfaces will land in drop by default; only eth0 is in public.
      ansible.builtin.command: firewall-cmd --set-default-zone=drop
      changed_when: false

    - name: Deploy fail2ban SSH jail config
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/ssh.conf
        mode: "0644"
        content: |
          [sshd]
          enabled  = true
          port     = ssh
          maxretry = {{ fail2ban_maxretry }}
          bantime  = {{ fail2ban_bantime }}
      notify: Restart fail2ban

    - name: Enable and start auditd
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started

    - name: Check firewalld status
      ansible.builtin.command: firewall-cmd --list-all
      register: firewall_status
      changed_when: false

    - name: Print firewalld status
      ansible.builtin.debug:
        msg: "{{ firewall_status.stdout_lines }}"

  handlers:
    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted