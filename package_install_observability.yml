---
# =============================================================================
# Stage 4 — Observability (Prometheus Node Exporter and Fluent Bit)
# Target: Amazon Linux 2023
#
# Instruments the VM for metrics collection and log forwarding. These agents
# run as lightweight background services and expose data to external monitoring
# and logging platforms without requiring application-level changes.
#
# Packages:
#   prometheus-node-exporter - Exposes hardware and OS-level metrics (CPU,
#                     memory, disk I/O, network throughput) on a local HTTP
#                     endpoint (port 9100) in Prometheus scrape format.
#                     Installed via direct binary download from the official
#                     Prometheus GitHub releases — the packagecloud.io RPM
#                     repo triggers apt fallback issues on AL2023.
#   fluent-bit        - High-performance log processor and forwarder; tails
#                     log files and system journals, applies parsing/filtering
#                     rules, and ships structured log data to downstream
#                     targets such as Elasticsearch, Loki, or Kafka.
#                     Sourced from the official Fluent Bit Amazon Linux repo.
#
# Verification:
#   This stage confirms the node exporter metrics endpoint (port 9100)
#   is reachable and returning HTTP 200 before marking the play complete.
# =============================================================================

- name: "Stage 4 — Observability (Prometheus node exporter and Fluent Bit)"
  hosts: all
  become: true
  gather_facts: true

  vars:
    node_exporter_version: "1.8.1"
    node_exporter_user: "node_exporter"
    node_exporter_install_dir: "/usr/local/bin"

  tasks:

    # ------------------------------------------------------------------ #
    #  Prometheus Node Exporter — direct binary install                   #
    # ------------------------------------------------------------------ #
    - name: Create node_exporter system user
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        shell: /sbin/nologin
        system: true
        create_home: false

    - name: Download node exporter binary
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"
        mode: "0644"

    - name: Extract node exporter binary
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp"
        remote_src: true

    - name: Install node exporter binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: "{{ node_exporter_install_dir }}/node_exporter"
        owner: "{{ node_exporter_user }}"
        group: "{{ node_exporter_user }}"
        mode: "0755"
        remote_src: true

    - name: Deploy node exporter systemd service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User={{ node_exporter_user }}
          ExecStart={{ node_exporter_install_dir }}/node_exporter
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and enable node exporter
      ansible.builtin.systemd:
        name: node_exporter
        daemon_reload: true
        enabled: true
        state: started

    # ------------------------------------------------------------------ #
    #  Fluent Bit                                                          #
    # ------------------------------------------------------------------ #
    - name: Write Fluent Bit yum repo file directly
      # ansible.builtin.yum_repository does not write the repo file in a
      # format dnf resolves correctly on AL2023. Writing the file directly
      # matches the format from the official Fluent Bit documentation.
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/fluent-bit.repo
        mode: "0644"
        content: |
          [fluent-bit]
          name = Fluent Bit
          baseurl = https://packages.fluentbit.io/amazonlinux/2023/
          gpgcheck=1
          gpgkey=https://packages.fluentbit.io/fluentbit.key
          enabled=1

    - name: Install Fluent Bit
      ansible.builtin.dnf:
        name: fluent-bit
        state: present
        update_cache: true

    - name: Enable and start Fluent Bit
      ansible.builtin.systemd:
        name: fluent-bit
        enabled: true
        state: started

    # ------------------------------------------------------------------ #
    #  Verification                                                        #
    # ------------------------------------------------------------------ #
    - name: Verify node exporter is listening on port 9100
      ansible.builtin.wait_for:
        port: 9100
        timeout: 15

    - name: Confirm node exporter metrics endpoint returns 200
      ansible.builtin.uri:
        url: http://localhost:9100/metrics
        return_content: false
        status_code: 200
      register: metrics_check

    - name: Print metrics endpoint status
      ansible.builtin.debug:
        msg: "Node exporter metrics endpoint responded {{ metrics_check.status }}"

    - name: Clean up downloaded archive
      ansible.builtin.file:
        path: "/tmp/node_exporter.tar.gz"
        state: absent