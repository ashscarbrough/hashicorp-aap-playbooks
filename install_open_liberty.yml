---
- name: Install Open Liberty (RHEL / Amazon Linux 2023)
  hosts: all
  become: true
  gather_facts: true

  vars:
    liberty_version: "24.0.0.12"
    liberty_install_dir: /opt/openliberty
    liberty_user: liberty
    liberty_group: liberty
    liberty_server_name: defaultServer
    liberty_http_port: 9080

    liberty_download_url: "https://public.dhe.ibm.com/ibmdl/export/pub/software/openliberty/runtime/release/{{ liberty_version }}/openliberty-{{ liberty_version }}.zip"

  handlers:
    - name: Systemd daemon-reload
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart liberty
      ansible.builtin.service:
        name: openliberty
        state: restarted

  pre_tasks:
    - name: Ensure supported OS
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "RedHat"
        fail_msg: "This playbook targets RHEL-family/Amazon Linux 2023."

  tasks:
    - name: Install prerequisites
      ansible.builtin.package:
        name:
          - unzip
          - curl
          - java-11-openjdk
        state: present

    - name: Create liberty group
      ansible.builtin.group:
        name: "{{ liberty_group }}"
        state: present

    - name: Create liberty user
      ansible.builtin.user:
        name: "{{ liberty_user }}"
        group: "{{ liberty_group }}"
        create_home: true
        shell: /sbin/nologin
        state: present

    - name: Create install dir
      ansible.builtin.file:
        path: "{{ liberty_install_dir }}"
        state: directory
        owner: "{{ liberty_user }}"
        group: "{{ liberty_group }}"
        mode: "0755"

    - name: Download Open Liberty zip
      ansible.builtin.get_url:
        url: "{{ liberty_download_url }}"
        dest: "/tmp/openliberty-{{ liberty_version }}.zip"
        mode: "0644"

    - name: Unarchive Open Liberty
      ansible.builtin.unarchive:
        src: "/tmp/openliberty-{{ liberty_version }}.zip"
        dest: "{{ liberty_install_dir }}"
        remote_src: true
        creates: "{{ liberty_install_dir }}/wlp/bin/server"

    - name: Ensure ownership
      ansible.builtin.file:
        path: "{{ liberty_install_dir }}"
        state: directory
        owner: "{{ liberty_user }}"
        group: "{{ liberty_group }}"
        recurse: true

    - name: Create server if missing
      ansible.builtin.command: "{{ liberty_install_dir }}/wlp/bin/server create {{ liberty_server_name }}"
      args:
        creates: "{{ liberty_install_dir }}/wlp/usr/servers/{{ liberty_server_name }}"
      become_user: "{{ liberty_user }}"

    - name: Configure HTTP port
      ansible.builtin.copy:
        dest: "{{ liberty_install_dir }}/wlp/usr/servers/{{ liberty_server_name }}/server.xml"
        owner: "{{ liberty_user }}"
        group: "{{ liberty_group }}"
        mode: "0644"
        content: |
          <server description="AAP Demo Open Liberty">
            <featureManager>
              <feature>servlet-6.0</feature>
            </featureManager>

            <httpEndpoint id="defaultHttpEndpoint"
              host="*"
              httpPort="{{ liberty_http_port }}" />

            <webContainer deferServletLoad="false"/>
          </server>
      notify: Restart liberty

    - name: Install systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/openliberty.service
        mode: "0644"
        content: |
          [Unit]
          Description=Open Liberty
          After=network.target

          [Service]
          Type=forking
          User={{ liberty_user }}
          Group={{ liberty_group }}
          WorkingDirectory={{ liberty_install_dir }}/wlp
          ExecStart={{ liberty_install_dir }}/wlp/bin/server start {{ liberty_server_name }}
          ExecStop={{ liberty_install_dir }}/wlp/bin/server stop {{ liberty_server_name }}
          TimeoutStartSec=120
          TimeoutStopSec=120
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      notify:
        - Systemd daemon-reload
        - Restart liberty

    - name: Enable and start Open Liberty
      ansible.builtin.service:
        name: openliberty
        state: started
        enabled: true