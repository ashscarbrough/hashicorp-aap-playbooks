---
- name: Test AAP File Creation
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Create proof file on target host
      ansible.builtin.copy:
        dest: /tmp/aap-proof.txt
        mode: "0644"
        content: |
          AAP connectivity proof
          inventory_hostname={{ inventory_hostname }}
          ansible_host={{ ansible_host | default('undefined') }}

    - name: Verify proof file exists
      ansible.builtin.stat:
        path: /tmp/aap-proof.txt
      register: proof_file

    - name: Report proof file status
      ansible.builtin.debug:
        msg: "Proof file created on {{ inventory_hostname }}: {{ proof_file.stat.path }}"
