---
# configure_demo_instance_v1.2.0.yml
#
# Deploys the v1.2.0 configuration to the demo instance.
# Run this job template from the AAP UI to install (or restore) version 1.2.0.
# Using the same blockinfile markers as configure_demo_instance.yml ensures this
# playbook is fully idempotent and safely overwrites any previously applied version.

- name: Configure demo instance — v1.2.0
  hosts: all
  become: true

  vars:
    config_version: "1.2.0"
    aap_job_id: "{{ tower_job_id | default('unknown') }}"

  pre_tasks:
    - name: Wait for SSH connection
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to complete
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

  tasks:

    # -------------------------------------------------------
    # Task 1 — Gather facts
    # -------------------------------------------------------
    - name: Gather instance facts
      ansible.builtin.setup:
        gather_subset:
          - network
          - hardware

    # -------------------------------------------------------
    # Task 2 — Write v1.2.0 runtime details to the version page
    # Uses the same blockinfile markers as configure_demo_instance.yml
    # so this playbook is idempotent and can overwrite any version.
    # -------------------------------------------------------
    - name: Write v1.2.0 runtime details to version page
      ansible.builtin.blockinfile:
        path: /usr/share/nginx/html/index.html
        marker: "<!-- {mark} ANSIBLE MANAGED BLOCK -->"
        block: |
          <div style="border-top:2px solid #EE0000;margin-top:20px;padding-top:20px;">
          <h2><span class='badge ansible'>Ansible Automation Platform</span></h2>
          <table>
            <tr><th>Config version</th><td>{{ config_version }}</td></tr>
            <tr><th>Hostname</th><td>{{ ansible_hostname }}</td></tr>
            <tr><th>IP address</th><td>{{ ansible_default_ipv4.address }}</td></tr>
            <tr><th>Total memory</th><td>{{ ansible_memtotal_mb }} MB</td></tr>
            <tr><th>CPU cores</th><td>{{ ansible_processor_vcpus }}</td></tr>
            <tr><th>AAP job ID</th><td>{{ aap_job_id }}</td></tr>
            <tr><th>Configured at</th><td>{{ ansible_date_time.iso8601 }}</td></tr>
          </table>
          <p style="color:#888;font-style:italic;margin-top:12px;">&#9888; /status endpoint not available in v1.2.0 &mdash; upgrade to v1.3.0 to enable.</p>
          </div>

    # -------------------------------------------------------
    # Task 3 — Remove the /status endpoint
    # /status was introduced in v1.3.0. Rolling back to v1.2.0
    # removes the file so the endpoint returns 404, visibly
    # demonstrating the feature regression on rollback.
    # -------------------------------------------------------
    - name: Remove status endpoint (not available in v1.2.0)
      ansible.builtin.file:
        path: /var/www/status/index.html
        state: absent

    # -------------------------------------------------------
    # Task 4 — Write audit file to the instance
    # -------------------------------------------------------
    - name: Write v1.2.0 audit file
      ansible.builtin.copy:
        dest: /etc/ansible-configured
        content: |
          Configured by Ansible Automation Platform
          ==========================================
          Timestamp : {{ ansible_date_time.iso8601 }}
          AAP job   : {{ aap_job_id }}
          Version   : {{ config_version }}
          Host      : {{ ansible_hostname }}
          IP        : {{ ansible_default_ipv4.address }}
        mode: '0644'

    # -------------------------------------------------------
    # Task 5 — Validate nginx is serving correctly
    # -------------------------------------------------------
    - name: Ensure nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Verify index page is reachable
      ansible.builtin.uri:
        url: "http://{{ ansible_default_ipv4.address }}"
        return_content: true
        status_code: 200

    - name: Verify status endpoint is absent (returns 404)
      ansible.builtin.uri:
        url: "http://{{ ansible_default_ipv4.address }}/status"
        status_code: 404

    - name: Report success
      ansible.builtin.debug:
        msg: >
          Instance {{ ansible_hostname }} is running version {{ config_version }}.
          Live at http://{{ ansible_default_ipv4.address }}
